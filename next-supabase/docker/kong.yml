_format_version: "3.0"
_transform: true

services:
  - name: auth-service
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: redis
          redis_host: redis
          redis_port: 6379
          hide_client_headers: false
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:54321"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - apikey
          credentials: true
          max_age: 3600

  - name: rest-service
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis
          redis_port: 6379
          hide_client_headers: false

  - name: realtime-service
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 50
          policy: redis
          redis_host: redis
          redis_port: 6379

  - name: storage-service
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          policy: redis
          redis_host: redis
          redis_port: 6379

  - name: meta-service
    url: http://meta:8080
    routes:
      - name: meta-route
        paths:
          - /meta/v1
        strip_path: true
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          policy: redis
          redis_host: redis
          redis_port: 6379

consumers:
  - username: anon
  - username: authenticated

plugins:
  - name: rate-limiting
    config:
      minute: 100
      policy: redis
      redis_host: redis
      redis_port: 6379
